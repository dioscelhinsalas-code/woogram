<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Memorama educativo de Profesiones y Oficios para niños. Encuentra parejas de profesiones, escucha sus nombres y avanza por tres niveles de dificultad.">
    <title>Memorama de Profesiones y Oficios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>👩‍🚀 Memorama de Profesiones 🧑‍🚒</h1>
            <p>¡Encuentra todas las parejas de profesiones y escucha sus nombres!</p>
            <button id="reset-btn">Reiniciar Juego 🔄</button>
        </header>

        <div class="difficulty-bar">
            <button class="btn-diff" data-difficulty="easy" onclick="setDifficulty('easy')">🟢 Fácil</button>
            <button class="btn-diff active" data-difficulty="medium" onclick="setDifficulty('medium')">🟡 Medio</button>
            <button class="btn-diff" data-difficulty="hard" onclick="setDifficulty('hard')">🔴 Difícil</button>
        </div>

        <main>
            <div id="game-board" class="game-board"></div>
        </main>
    </div>

    <!-- Modal de Felicitación -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="confetti-container" id="confetti"></div>
            <h2 id="modal-title">¡Excelente Trabajo! 🎉</h2>
            <p id="modal-message">¡Has encontrado todas las parejas de profesiones!</p>
            <div class="modal-buttons">
                <button id="next-level-btn" class="btn-action">Siguiente Nivel 🚀</button>
                <button id="play-again-btn" class="btn-action secondary">Volver a Jugar 🔄</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
